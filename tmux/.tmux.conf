# ~/.tmux.conf
# ============================================================
# 基本設定
# ============================================================
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -g mouse on
set -g history-limit 50000
set -g base-index 1          # ウィンドウ番号を1始まりに
setw -g pane-base-index 1    # ペイン番号も1始まりに
set -g renumber-windows on   # ウィンドウ削除時に番号詰め
set -s escape-time 0         # Escの遅延をなくす（Neovim向け）
set -g focus-events on       # Neovimのautoread用

# ============================================================
# Prefix キー
# ============================================================
# Ctrl+a に変更（Ctrl+bは遠い）
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ============================================================
# ペイン操作
# ============================================================
# vim風のペイン移動
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ペインリサイズ (prefix + H/J/K/L)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# 分割時にカレントディレクトリを引き継ぐ
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# ============================================================
# ウィンドウ操作
# ============================================================
bind c new-window -c "#{pane_current_path}"

# Alt+数字でウィンドウ切り替え（prefix不要で高速）
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

# ============================================================
# プロジェクトウィンドウ即席作成 (prefix + P)
# ============================================================
# fzfでディレクトリ選択 → CC+作業用の2ペイン構成を即座に作る
bind P run-shell "tmux new-window -n 'proj' -c '#{pane_current_path}' \\; \
  split-window -h -c '#{pane_current_path}' \\; \
  select-pane -t 0"

# ============================================================
# コピーモード (vi)
# ============================================================
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# macOS: pbcopy連携
if-shell "uname | grep -q Darwin" \
  "bind -T copy-mode-vi y send -X copy-pipe-and-cancel 'pbcopy'"

# WSL: clip.exe連携
if-shell "uname -r | grep -qi microsoft" \
  "bind -T copy-mode-vi y send -X copy-pipe-and-cancel 'clip.exe'"

# ============================================================
# ステータスバー
# ============================================================
set -g status-position top
set -g status-style "bg=#1e1e2e,fg=#cdd6f4"
set -g status-left-length 30
set -g status-right-length 60

set -g status-left "#[fg=#89b4fa,bold] #S "
set -g status-right "#[fg=#a6adc8]%m/%d %H:%M "

# アクティブウィンドウ
setw -g window-status-current-format "#[fg=#1e1e2e,bg=#89b4fa,bold] #I:#W "
# 非アクティブウィンドウ
setw -g window-status-format "#[fg=#6c7086] #I:#W "

# ============================================================
# 設定リロード
# ============================================================
bind r source-file ~/.tmux.conf \; display "Reloaded!
